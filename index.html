<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoagoClips</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
    <header class="top-nav">
    <div class="nav-content">
        <img src="images/logo2.png" alt="BoagoClips Logo" class="nav-logo">
        <h2>BoagoClips</h2>
    </div>
</header>

    <main class="video-feed" id="video-feed">
        
        <div class="video-container">
            <video class="boago-video" loop>
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
                Your browser does not support HTML video.
            </video>
            
            <div class="video-sidebar">
                <button class="action-btn">❤️</button>
                <button class="action-btn">💬</button>
                <button class="action-btn">↪️</button>
            </div>
            
            <div class="video-info">
                <h3>@boago</h3>
                <p> Scroll down i guess</p>
            </div>
        </div>

        <div class="video-container">
            <video class="boago-video" loop>
                <source src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.webm" type="video/webm">
            </video>
            <div class="video-sidebar">
                <button class="action-btn">❤️</button>
                <button class="action-btn">💬</button>
                <button class="action-btn">↪️</button>
            </div>
            <div class="video-info">
                <h3>@developer</h3>
                <p>Testing the scroll snap feature.</p>
            </div>
        </div>

        <div class="video-container">
            <video class="boago-video" loop>
                <source src="videos/video 2.mp4" type="video/mp4">
                Your browser does not support HTML video.
            </video>
            
            <div class="video-sidebar">
                <button class="action-btn">❤️</button>
                <button class="action-btn">💬</button>
                <button class="action-btn">↪️</button>
            </div>
            
            <div class="video-info">
                <h3>@boago</h3>
                <p>This is me twin 👇</p>
            </div>
        </div>

    </main>

    <script src="app.js"></script>
</body>
</html>
